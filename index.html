<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Social links profile</title>
  <link href="https://fonts.google.com/specimen/Inter">
</head>

<body>
  <main>
    <div>
      <img src="assets/images/avatar-jessica.jpeg" alt="avatar" width="100px" height="100px">
      <h2 class="en-tête" id="titre">Jessica Randall</h2>
      <h5 class="en-tête" style="color: hsl(75, 94%, 57%);">London, United Kingdom</h5>
      <p>"Front-end developer and avid reader."</p>
      <br>
      <nav>
        <button>GitHub</button>
        <br>
        <button>Frontend Mentor</button>
        <br>
        <button>LinkedIn</button>
        <br>
        <button>Twitter</button>
        <br>
        <button>Instagram</button>
      </nav>
    </div>
  </main>
  <br>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="https://www.frontendmentor.io/profile/rmArchiviste">@rmArchiviste</a>.
  </footer>
</body>
<style>
  body {
    background-color: gray;
    font-family: Inter, sans-serif;
  }

  main {
    background-color: rgb(17, 17, 17);
    color: white;
    width: 1000px;
    height: 1000px;
    margin-left: 12%;
    padding-top: 20px;
  }

  div {
    text-align: center;
    border: solid rgb(29, 29, 29);
    border-radius: 7px;
    width: 400px;
    height: 590px;
    margin-left: 30%;
    margin-top: 10%;
    background-color: rgb(29, 29, 29);
  }

  img {
    border-radius: 50%;
    margin-top: 10%;
    margin-bottom: 4%;
  }

  button {
    background-color: rgb(61, 61, 61);
    color: white;
    width: 280px;
    height: 40px;
    border: none;
    border-radius: 7px;
    font-weight: 700;
  }

  nav {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .en-tête {
    margin: 0%;
  }
  #titre {
    margin: 2%;
  }

  p {
    margin-top: 7%;
    margin-bottom: 1%;
    font-size: 14px;
  }
</style>

</html>
